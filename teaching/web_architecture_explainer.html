<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Architecture Explainer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f4f0;
      --color-background-info: #e6f1fb;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-text-info: #185fa5;
      --color-border-tertiary: rgba(0,0,0,0.12);
      --color-border-secondary: rgba(0,0,0,0.22);
      --color-border-info: #378add;
      --font-sans: system-ui, -apple-system, sans-serif;
      --font-mono: ui-monospace, 'Cascadia Code', monospace;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1e1e1c;
        --color-background-secondary: #2c2c2a;
        --color-background-info: #042c53;
        --color-text-primary: #e8e6de;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-text-info: #85b7eb;
        --color-border-tertiary: rgba(255,255,255,0.1);
        --color-border-secondary: rgba(255,255,255,0.2);
        --color-border-info: #378add;
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .wrapper { width: 100%; max-width: 720px; }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 1.25rem;
    }

    .step-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .step-btn {
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 20px;
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all .2s;
      font-family: var(--font-sans);
    }
    .step-btn.active {
      background: var(--color-background-info);
      color: var(--color-text-info);
      border-color: var(--color-border-info);
    }
    .step-btn:hover:not(.active) { background: var(--color-background-secondary); }

    .card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
    }

    .diagram-area svg { display: block; }

    .explainer {
      padding: 1rem 1.25rem;
      border-top: 0.5px solid var(--color-border-tertiary);
    }
    .explainer h3 {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 6px;
    }
    .explainer p {
      font-size: 13px;
      color: var(--color-text-secondary);
      line-height: 1.6;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 1.25rem;
      border-top: 0.5px solid var(--color-border-tertiary);
    }
    .nav-btn {
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-family: var(--font-sans);
    }
    .nav-btn:hover:not(:disabled) { background: var(--color-background-secondary); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .step-label { font-size: 12px; color: var(--color-text-tertiary); }

    /* SVG text classes */
    svg .t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
    svg .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
    svg .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }

    /* Color ramp classes for SVG */
    svg .c-blue   > rect, svg .c-blue   > circle, svg .c-blue   > ellipse { fill: #E6F1FB; stroke: #185FA5; }
    svg .c-teal   > rect, svg .c-teal   > circle, svg .c-teal   > ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    svg .c-purple > rect, svg .c-purple > circle, svg .c-purple > ellipse { fill: #EEEDFE; stroke: #534AB7; }
    svg .c-amber  > rect, svg .c-amber  > circle, svg .c-amber  > ellipse { fill: #FAEEDA; stroke: #854F0B; }
    svg .c-green  > rect, svg .c-green  > circle, svg .c-green  > ellipse { fill: #EAF3DE; stroke: #3B6D11; }
    svg .c-gray   > rect, svg .c-gray   > circle, svg .c-gray   > ellipse { fill: #F1EFE8; stroke: #5F5E5A; }

    svg .c-blue   .th, svg .c-blue   .t  { fill: #0C447C; }
    svg .c-blue   .ts { fill: #185FA5; }
    svg .c-teal   .th, svg .c-teal   .t  { fill: #085041; }
    svg .c-teal   .ts { fill: #0F6E56; }
    svg .c-purple .th, svg .c-purple .t  { fill: #3C3489; }
    svg .c-purple .ts { fill: #534AB7; }
    svg .c-amber  .th, svg .c-amber  .t  { fill: #633806; }
    svg .c-amber  .ts { fill: #854F0B; }
    svg .c-green  .th, svg .c-green  .t  { fill: #27500A; }
    svg .c-green  .ts { fill: #3B6D11; }
    svg .c-gray   .th, svg .c-gray   .t  { fill: #2C2C2A; }
    svg .c-gray   .ts { fill: #5F5E5A; }

    @media (prefers-color-scheme: dark) {
      svg .c-blue   > rect { fill: #0C447C; stroke: #B5D4F4; }
      svg .c-teal   > rect { fill: #085041; stroke: #9FE1CB; }
      svg .c-purple > rect { fill: #3C3489; stroke: #CECBF6; }
      svg .c-amber  > rect { fill: #633806; stroke: #FAC775; }
      svg .c-green  > rect { fill: #27500A; stroke: #C0DD97; }
      svg .c-gray   > rect { fill: #2C2C2A; stroke: #B4B2A9; }
      svg .c-blue   .th, svg .c-blue   .t  { fill: #B5D4F4; }
      svg .c-blue   .ts { fill: #85B7EB; }
      svg .c-teal   .th, svg .c-teal   .t  { fill: #9FE1CB; }
      svg .c-teal   .ts { fill: #5DCAA5; }
      svg .c-purple .th, svg .c-purple .t  { fill: #CECBF6; }
      svg .c-purple .ts { fill: #AFA9EC; }
      svg .c-amber  .th, svg .c-amber  .t  { fill: #FAC775; }
      svg .c-amber  .ts { fill: #EF9F27; }
      svg .c-green  .th, svg .c-green  .t  { fill: #C0DD97; }
      svg .c-green  .ts { fill: #97C459; }
      svg .c-gray   .th, svg .c-gray   .t  { fill: #D3D1C7; }
      svg .c-gray   .ts { fill: #B4B2A9; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <h1>Web Architecture — Frontend, Backend, Database & Python</h1>
  <div class="step-nav" id="stepNav"></div>
  <div class="card">
    <div class="diagram-area">
      <svg id="mainSvg" width="100%" viewBox="0 0 680 260"></svg>
    </div>
    <div class="explainer" id="explainer"></div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="changeStep(-1)">← Back</button>
      <span class="step-label" id="stepLabel"></span>
      <button class="nav-btn" id="nextBtn" onclick="changeStep(1)">Next →</button>
    </div>
  </div>
</div>

<script>
const ARROW_DEFS = `<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

const steps = [
  {
    label: "The Big Picture",
    title: "How a website really works",
    desc: "Every website has three layers working together. Think of ordering food at a restaurant — you see the menu (Frontend), the waiter takes your order (Backend with Python), and the kitchen stores recipes (Database). Let's explore each one.",
    svg: ARROW_DEFS + `
      <g class="c-blue">
        <rect x="30" y="88" width="140" height="80" rx="10" stroke-width="0.5"/>
        <text class="th" x="100" y="121" text-anchor="middle" dominant-baseline="central">Frontend</text>
        <text class="ts" x="100" y="143" text-anchor="middle" dominant-baseline="central">What users see</text>
      </g>
      <g class="c-teal">
        <rect x="270" y="88" width="140" height="80" rx="10" stroke-width="0.5"/>
        <text class="th" x="340" y="113" text-anchor="middle" dominant-baseline="central">Backend</text>
        <text class="ts" x="340" y="131" text-anchor="middle" dominant-baseline="central">Python logic</text>
        <text class="ts" x="340" y="149" text-anchor="middle" dominant-baseline="central">Flask / Django</text>
      </g>
      <g class="c-purple">
        <rect x="510" y="88" width="140" height="80" rx="10" stroke-width="0.5"/>
        <text class="th" x="580" y="121" text-anchor="middle" dominant-baseline="central">Database</text>
        <text class="ts" x="580" y="143" text-anchor="middle" dominant-baseline="central">SQL stores data</text>
      </g>
      <line x1="170" y1="120" x2="270" y2="120" stroke="#378ADD" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="270" y1="136" x2="170" y2="136" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="410" y1="120" x2="510" y2="120" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="510" y1="136" x2="410" y2="136" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <text class="ts" x="220" y="112" text-anchor="middle">request</text>
      <text class="ts" x="220" y="148" text-anchor="middle">response</text>
      <text class="ts" x="460" y="112" text-anchor="middle">SQL query</text>
      <text class="ts" x="460" y="148" text-anchor="middle">data</text>
      <text class="ts" x="100" y="200" text-anchor="middle">HTML / CSS / JS</text>
      <text class="ts" x="340" y="200" text-anchor="middle">Python is the glue!</text>
      <text class="ts" x="580" y="200" text-anchor="middle">MySQL / PostgreSQL</text>
    `
  },
  {
    label: "Frontend",
    title: "Frontend — what users see and touch",
    desc: "Frontend is everything you see in the browser: buttons, images, text, forms. It's built with HTML (structure), CSS (styling), and JavaScript (interactivity). It runs on YOUR computer — no internet needed once loaded!",
    svg: ARROW_DEFS + `
      <g class="c-blue">
        <rect x="30" y="60" width="280" height="150" rx="12" stroke-width="0.5"/>
        <text class="th" x="170" y="88" text-anchor="middle" dominant-baseline="central">Browser (Your computer)</text>
      </g>
      <g class="c-gray">
        <rect x="55" y="105" width="70" height="36" rx="6" stroke-width="0.5"/>
        <text class="ts" x="90" y="123" text-anchor="middle" dominant-baseline="central">HTML</text>
      </g>
      <g class="c-gray">
        <rect x="145" y="105" width="70" height="36" rx="6" stroke-width="0.5"/>
        <text class="ts" x="180" y="123" text-anchor="middle" dominant-baseline="central">CSS</text>
      </g>
      <g class="c-gray">
        <rect x="235" y="105" width="60" height="36" rx="6" stroke-width="0.5"/>
        <text class="ts" x="265" y="123" text-anchor="middle" dominant-baseline="central">JS</text>
      </g>
      <text class="ts" x="90" y="168" text-anchor="middle">Structure</text>
      <text class="ts" x="180" y="168" text-anchor="middle">Style</text>
      <text class="ts" x="265" y="168" text-anchor="middle">Actions</text>
      <g class="c-amber">
        <rect x="390" y="90" width="250" height="55" rx="8" stroke-width="0.5"/>
        <text class="th" x="515" y="112" text-anchor="middle" dominant-baseline="central">User types search: "cat"</text>
        <text class="ts" x="515" y="133" text-anchor="middle" dominant-baseline="central">→ JS sends request to backend</text>
      </g>
      <g class="c-green">
        <rect x="390" y="165" width="250" height="40" rx="8" stroke-width="0.5"/>
        <text class="ts" x="515" y="185" text-anchor="middle" dominant-baseline="central">← HTML displays results on screen</text>
      </g>
      <line x1="310" y1="128" x2="388" y2="117" stroke="#BA7517" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="388" y1="175" x2="310" y2="150" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
    `
  },
  {
    label: "Database & SQL",
    title: "Database — the filing cabinet of the internet",
    desc: "A database stores all the important data: user accounts, posts, products, prices. SQL (Structured Query Language) is the language used to talk to it. Think of SQL like speaking to a librarian — you ask a question, it finds the answer.",
    svg: ARROW_DEFS + `
      <g class="c-purple">
        <rect x="30" y="55" width="220" height="155" rx="12" stroke-width="0.5"/>
        <text class="th" x="140" y="78" text-anchor="middle" dominant-baseline="central">Database (SQL Table)</text>
      </g>
      <rect x="52" y="96" width="176" height="24" rx="4" fill="#AFA9EC" opacity="0.4"/>
      <text class="ts" x="70" y="108" dominant-baseline="central" style="font-weight:500">id</text>
      <text class="ts" x="108" y="108" dominant-baseline="central" style="font-weight:500">name</text>
      <text class="ts" x="168" y="108" dominant-baseline="central" style="font-weight:500">score</text>
      <text class="ts" x="70" y="133" dominant-baseline="central">1</text>
      <text class="ts" x="108" y="133" dominant-baseline="central">Alice</text>
      <text class="ts" x="168" y="133" dominant-baseline="central">95</text>
      <text class="ts" x="70" y="157" dominant-baseline="central">2</text>
      <text class="ts" x="108" y="157" dominant-baseline="central">Bob</text>
      <text class="ts" x="168" y="157" dominant-baseline="central">87</text>
      <text class="ts" x="70" y="181" dominant-baseline="central">3</text>
      <text class="ts" x="108" y="181" dominant-baseline="central">Chloe</text>
      <text class="ts" x="168" y="181" dominant-baseline="central">91</text>
      <g class="c-amber">
        <rect x="320" y="60" width="320" height="50" rx="8" stroke-width="0.5"/>
        <text class="th" x="480" y="80" text-anchor="middle" dominant-baseline="central">SQL Query (ask the database)</text>
        <text class="ts" x="480" y="100" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:11px">SELECT * FROM students WHERE score &gt; 90</text>
      </g>
      <g class="c-green">
        <rect x="320" y="130" width="320" height="50" rx="8" stroke-width="0.5"/>
        <text class="th" x="480" y="150" text-anchor="middle" dominant-baseline="central">Result returned</text>
        <text class="ts" x="480" y="169" text-anchor="middle" dominant-baseline="central">Alice (95), Chloe (91)</text>
      </g>
      <line x1="320" y1="108" x2="250" y2="130" stroke="#BA7517" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="250" y1="150" x2="320" y2="155" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <text class="ts" x="285" y="123">query</text>
      <text class="ts" x="275" y="162">answer</text>
    `
  },
  {
    label: "Python as Glue",
    title: "Python — the glue that holds everything together",
    desc: "Python (with Flask or Django) sits in the middle as the backend. It receives requests from the frontend, writes SQL to query the database, then sends results back. Python is the translator — it speaks 'browser language' AND 'database language'!",
    svg: ARROW_DEFS + `
      <g class="c-blue">
        <rect x="20" y="95" width="120" height="60" rx="8" stroke-width="0.5"/>
        <text class="th" x="80" y="119" text-anchor="middle" dominant-baseline="central">Frontend</text>
        <text class="ts" x="80" y="139" text-anchor="middle" dominant-baseline="central">Browser</text>
      </g>
      <g class="c-teal">
        <rect x="245" y="70" width="190" height="110" rx="10" stroke-width="1"/>
        <text class="th" x="340" y="93" text-anchor="middle" dominant-baseline="central">Python Backend</text>
        <text class="ts" x="340" y="120" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:11px">@app.route('/search')</text>
        <text class="ts" x="340" y="152" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:11px">db.execute(sql_query)</text>
      </g>
      <g class="c-purple">
        <rect x="540" y="95" width="120" height="60" rx="8" stroke-width="0.5"/>
        <text class="th" x="600" y="119" text-anchor="middle" dominant-baseline="central">Database</text>
        <text class="ts" x="600" y="139" text-anchor="middle" dominant-baseline="central">SQL / MySQL</text>
      </g>
      <line x1="140" y1="118" x2="245" y2="110" stroke="#378ADD" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="245" y1="134" x2="140" y2="140" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="435" y1="116" x2="540" y2="116" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="540" y1="134" x2="435" y2="134" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <text class="ts" x="192" y="107">HTTP request</text>
      <text class="ts" x="192" y="147">JSON response</text>
      <text class="ts" x="487" y="109">SQL query</text>
      <text class="ts" x="492" y="147">data rows</text>
      <text class="ts" x="340" y="210" text-anchor="middle">Python is the "glue" — it connects browser and database!</text>
    `
  },
  {
    label: "Live Flow",
    title: "Putting it all together — a real request",
    desc: "Watch what happens when someone logs into a website: (1) Browser sends username+password → (2) Python receives it, writes SQL to check the database → (3) Database finds the user → (4) Python sends back 'Login OK!' → (5) Browser shows the home page.",
    svg: ARROW_DEFS + `
      <g class="c-blue">
        <rect x="20" y="90" width="120" height="60" rx="8" stroke-width="0.5"/>
        <text class="th" x="80" y="114" text-anchor="middle" dominant-baseline="central">Browser</text>
        <text class="ts" x="80" y="133" text-anchor="middle" dominant-baseline="central">alice / ••••</text>
      </g>
      <g class="c-teal">
        <rect x="270" y="90" width="140" height="60" rx="8" stroke-width="0.5"/>
        <text class="th" x="340" y="114" text-anchor="middle" dominant-baseline="central">Python</text>
        <text class="ts" x="340" y="133" text-anchor="middle" dominant-baseline="central">Flask checks login</text>
      </g>
      <g class="c-purple">
        <rect x="540" y="90" width="120" height="60" rx="8" stroke-width="0.5"/>
        <text class="th" x="600" y="114" text-anchor="middle" dominant-baseline="central">Database</text>
        <text class="ts" x="600" y="133" text-anchor="middle" dominant-baseline="central">users table</text>
      </g>
      <line x1="140" y1="113" x2="270" y2="113" stroke="#378ADD" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="270" y1="133" x2="140" y2="133" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="410" y1="113" x2="540" y2="113" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <line x1="540" y1="133" x2="410" y2="133" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a)" fill="none"/>
      <text class="ts" x="205" y="106">① POST /login</text>
      <text class="ts" x="205" y="144">⑤ "Welcome Alice!"</text>
      <text class="ts" x="470" y="105">② SELECT WHERE user='alice'</text>
      <text class="ts" x="490" y="145">③ Found! → ④ OK</text>
      <g class="c-amber">
        <rect x="130" y="190" width="420" height="38" rx="8" stroke-width="0.5"/>
        <text class="ts" x="340" y="209" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:11px">result = db.execute("SELECT * FROM users WHERE username=?", [username])</text>
      </g>
    `
  }
];

let current = 0;

function render() {
  const s = steps[current];
  document.getElementById('mainSvg').innerHTML = s.svg;
  document.getElementById('explainer').innerHTML = `<h3>${s.title}</h3><p>${s.desc}</p>`;
  document.getElementById('stepLabel').textContent = `${current + 1} / ${steps.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === steps.length - 1;
  document.querySelectorAll('.step-btn').forEach((b, i) => b.classList.toggle('active', i === current));
}

function changeStep(dir) {
  current = Math.max(0, Math.min(steps.length - 1, current + dir));
  render();
}

const nav = document.getElementById('stepNav');
steps.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'step-btn';
  btn.textContent = s.label;
  btn.onclick = () => { current = i; render(); };
  nav.appendChild(btn);
});

render();
</script>
</body>
</html>
